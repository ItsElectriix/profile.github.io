<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;
}

.container{
    width:90%;
    max-width:420px;
    text-align:center;
}

.profile{
    margin-bottom:35px;
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #fff;
    object-fit:cover;
    margin-bottom:15px;
}

.profile h1{
    font-size:30px;
    margin-bottom:8px;
}

.profile p{
    opacity:.8;
}

.links{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.link{
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    color:#fff;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.2);
    backdrop-filter:blur(12px);
    border-radius:16px;
    padding:16px 20px;
    transition:.25s;
}

.link:hover{
    transform:translateY(-4px);
    background:#fff;
    color:#6b46c1;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.icon{
    width:34px;
    height:34px;
    object-fit:contain;
    flex-shrink:0;
}

.link span{
    flex:1;
    text-align:left;
    font-weight:600;
    font-size:17px;
}

footer{
    margin-top:30px;
    opacity:.7;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <!-- Replace with your own profile picture -->
        <img src="https://i.imgur.com/QIrZWGIs.jpg" alt="Profile">

        <h1>@YourUsername</h1>
        <p>Welcome to my links!</p>
    </div>

    <div class="links">

        <a class="link" href="https://yourwebsite.com" target="_blank">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" alt="">
            <span>Website</span>
        </a>

        <a class="link" href="https://youtube.com/@YourChannel" target="_blank">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="">
            <span>YouTube</span>
        </a>

        <a class="link" href="https://github.com/YourUsername" target="_blank">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733553.png" alt="">
            <span>GitHub</span>
        </a>

        <a class="link" href="https://instagram.com/YourUsername" target="_blank">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="">
            <span>Instagram</span>
        </a>

        <a class="link" href="https://discord.gg/YourInvite" target="_blank">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="">
            <span>Discord</span>
        </a>

        <a class="link" href="mailto:you@example.com">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="">
            <span>Email Me</span>
        </a>

    </div>

    <footer>
        © 2026 Your Name
    </footer>

</div>

</body>
</html>
